<style>
  .talk-videos-heading {
    font-size: 1.2rem;
    margin-bottom: 0.75rem;
    font-weight: 600;
  }
  .talk-videos-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
  }
  @media (max-width: 768px) {
    .talk-videos-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  .talk-video-thumb {
    position: relative;
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 16 / 9;
    background: #0d1117;
  }
  .talk-video-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .talk-video-thumb .tib-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.7);
    font-size: 2rem;
    background: #1a1a2e;
    z-index: 0;
  }
  .talk-video-thumb .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    z-index: 1;
    opacity: 0.85;
    transition: opacity 0.2s;
  }
  .talk-video-thumb:hover .play-btn {
    opacity: 1;
  }
  .talk-video-thumb .play-btn svg {
    width: 48px;
    height: 34px;
  }
  @media (max-width: 768px) {
    .talk-video-thumb .play-btn svg {
      width: 36px;
      height: 25px;
    }
  }
  .talk-video-thumb iframe {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    border: 0;
  }
</style>

<script>
  document.querySelectorAll('.talk-video-thumb').forEach(function (thumb) {
    function activateVideo() {
      if (thumb.querySelector('iframe')) return;
      var iframe = document.createElement('iframe');
      iframe.src = thumb.dataset.src;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.title = thumb.dataset.title || 'Talk video';
      thumb.textContent = '';
      thumb.style.cursor = 'default';
      thumb.appendChild(iframe);
    }
    thumb.addEventListener('click', activateVideo);
  });
</script>
